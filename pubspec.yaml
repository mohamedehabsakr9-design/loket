name: lokit_app
description: "Lokit Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - lib/assets/logo.png
    - lib/assets/splash1.jpg
    - lib/assets/splash2.jpg
    - lib/assets/bro 2.png
    - lib/assets/bro.png
    - lib/assets/Group 3.png
    - lib/assets/Group 1171278176.png
    - lib/assets/rafiki.png
    - lib/assets/icon .png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon .png"
  min_sdk_android: 21